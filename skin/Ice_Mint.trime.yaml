preset_keyboards:
  default:
    name: 26键
    author: Yexkr
    width: 10
    ascii_mode: 0
    lock: true
    label_transform: uppercase # 小写标签自动转为大写标签
    keys:
      # 第一行
      - { click: "q", key_back_color: "bh1", key_text_color: "th1", label_symbol: "1", swipe_up: "Q", swipe_down: "1" }
      - { click: "w", key_back_color: "bh1", key_text_color: "th1", label_symbol: "2", swipe_up: "W", swipe_down: "2" }
      - { click: "e", key_back_color: "bh1", key_text_color: "th1", label_symbol: "3", swipe_up: "E", swipe_down: "3" }
      - { click: "r", key_back_color: "bh1", key_text_color: "th1", label_symbol: "4", swipe_up: "R", swipe_down: "4" }
      - { click: "t", key_back_color: "bh1", key_text_color: "th1", label_symbol: "5", swipe_down: "5", swipe_up: "T" }
