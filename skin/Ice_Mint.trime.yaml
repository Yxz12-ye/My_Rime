# 液态键盘（符号面板）配置
liquid_keyboard:
  # 目前只能直接写参数，不支持变量或者fallback机制。
  # 缺少参数时，自动从style中加载参数。除非需要指定liquid_keyboard使用与主键盘不同的背景色、背景图，否则不应设置被注释掉的参数。
  row: 6              # 每屏最多显示多少行按键
  row_land: 5         # 横屏每屏最多显示多少行按键
  key_height: 20      # 按键高度
  key_height_land: 40 # 横屏模式按键高度
  single_width: 50    # single类型的按键宽度
  vertical_gap: 8     # 纵向按键间隙
  margin_x: 4         # 左右按键间隙的1/2
  fixed_key_bar:      # 固定按键条
    position: left     # 摆放位置（在滚动区域的顶部）
    width: 20       # 固定按键条宽度
    keys:             # 按键（显示名称为对应的label，不能放太多）
      - Return2
      - space1
      - BackSpace3
      - liquid_keyboard_exit
  keyboards:          # tab列表
    - history
    - ascii
    - emoji
    - math
    - script_symbols
    - cn
    - list
    - unit
  history:            # 历史输入
    name: 常用
    type: HISTORY
  emoji:              # emoji表情
    type: SINGLE
    name: emoji
  math:               # 数学符号
    type: SINGLE
    name: 数学
  cn:                 # 中文标点
    type: SINGLE
    name: 中文
  script_symbols:
    name: 𝒶𝒜
    type: SINGLE
    keys: "𝒶𝒷𝒸𝒹ℯ𝒻ℊ𝒽𝒾𝒿𝓀𝓁𝓂𝓃ℴ𝓅𝓆𝓇𝓈𝓉𝓊𝓋𝓌𝓍𝓎𝓏𝒜ℬ𝒞𝒟ℰℱ𝒢ℋℐ𝒥𝒦ℒℳ𝒩𝒪𝒫𝒬ℛ𝒮𝒯𝒰𝒱𝒲𝒳𝒴𝒵"
  symbol:             # 特殊符号
    name: 特殊
    type: SINGLE
  unit:               # 单位符号
    name: 单位
    type: SINGLE
  list:               # 列表序号
    name: 列表
    type: SINGLE
  ascii:              # 西文标点
    type: SINGLE
    name: 英符
    keys: ',.?!:;/\|*-+=^$`''"^~@#%&()[]{}_'


# 工具条配置
tool_bar:
  button_spacing: 5 # 按钮间距
  button_font: [iconfont.ttf] # 按钮字体
  # 左侧固定主按钮配置
  primary_button: { background: { type: "circle", corner_radius: 10, normal: 0, highlight: "hilited_candidate_button_color", vertical_inset: 4, horizontal_inset: 0 }, foreground: { style: "ic@dots_horizontal", normal: "candidate_text_color", padding: 10 }, action: "menu_keyboard" }
  hide_button: &hide_button { foreground: { style: "ic@keyboard_close", normal: "candidate_text_color" }, action: "Hide" } # 隐藏按钮
  emoji_button: &emoji_button { foreground: { style: "ic@emoticon" }, action: "liquid_keyboard_emoji" } # emoji按钮
  clipboard_button: &clipboard_button { foreground: { style: "ic@clipboard" }, action: "clipboard_window" } # 剪切板按钮
  edit_button: &edit_button { foreground: { style: "ic@cursor_text" }, action: "Keyboard_editor" } # 编辑键盘按钮
  ascii_mode_button: &ascii_mode_button { foreground: { option_styles: [ "中", "En" ], font_size: 18, padding: 10 }, action: "Mode_switch" } # 中英切换按钮
  full_shape_button: &full_shape_button { foreground: { option_styles: [ "ic@moon_full", "ic@moon_new" ] }, action: "Zenkaku_Hankaku" } # 全半角切换按钮
  menu_button: &menu_button
    foreground:
      # style: "ic@dots-vertical"
      # style: "ic@dots-vertical-circle"
      # style: "ic@earth"
      style: "ic@cog"
    # 前景样式可以为空，使用默认样式，按钮将显示为 action 的 label
      font_size: 14
    action: Keyboard_func
  # 右侧按钮列表（从右向左排列）
  buttons:
    - *hide_button
    - *menu_button
    - *emoji_button
    - *clipboard_button
    - *edit_button
    - *ascii_mode_button
    - *full_shape_button
