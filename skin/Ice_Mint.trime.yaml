      - { click: "Return", width: 20, composing: "Return1", key_back_color: "benter", key_text_color: "tenter" }
  
  number:
    name: 数字键盘
    width: 10
    ascii_mode: 1
    keys:
    # 第一行
    - { click: "#", width: 12, key_back_color: "bh1", key_text_color: "th1" }
    - { click: "+", width: 12, key_back_color: "bh1", key_text_color: "th1" }
    - { click: "1", width: 20, key_back_color: "bh1", key_text_color: "th1" }
    - { click: "2", width: 20, key_back_color: "bh1", key_text_color: "th1" }
    - { click: "3", width: 20, key_back_color: "bh1", key_text_color: "th1" }
    - { click: "%", width: 16, key_back_color: "bh1", key_text_color: "th1" }
    # 第二行
    - { click: "_", width: 12, key_back_color: "bh2", key_text_color: "th2" }
    - { click: "-", width: 12, key_back_color: "bh2", key_text_color: "th2" }
    - { click: "4", width: 20, key_back_color: "bh2", key_text_color: "th2" }
    - { click: "5", width: 20, key_back_color: "bh2", key_text_color: "th2" }
    - { click: "6", width: 20, key_back_color: "bh2", key_text_color: "th2" }
    - { click: "BackSpace", width: 16, key_back_color: "bh2", key_text_color: "th2" }
    # 第三行
    - { click: "@", width: 12, key_back_color: "bh3", key_text_color: "th3" }
    - { click: "*", width: 12, key_back_color: "bh3", key_text_color: "th3" }
    - { click: "7", width: 20, key_back_color: "bh3", key_text_color: "th3" }
    - { click: "8", width: 20, key_back_color: "bh3", key_text_color: "th3" }
    - { click: "9", width: 20, key_back_color: "bh3", key_text_color: "th3" }
    - { click: "space1", width: 16, key_back_color: "bh3", key_text_color: "th3" }
    # 第四行
    - { click: "Keyboard_default", width: 24, key_back_color: "highlited_key_back_color", key_text_color: "th4" }
