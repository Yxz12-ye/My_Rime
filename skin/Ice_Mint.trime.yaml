config_version: "3.0"
name: 冰薄荷
author: Yexkr

# 界面风格、功能开关
style:
  auto_caps: false # 自動句首大寫:true|false|ascii
  proximity_correction: true # 按键纠错
  reset_ascii_mode: false # 显示键盘是否重置为中文模式
  vertical_correction: -5 # 垂直校正
  key_font: MapleMono-NF-CN-Thin.ttf # 键盘字体
  candidate_font: MapleMono-NF-CN-Thin.ttf # 候选字体
  comment_font: MapleMono-NF-CN-Thin.ttf # 编码提示字体
  text_font: MapleMono-NF-CN-Thin.ttf # 编码字体
  symbol_font: MapleMono-NF-CN-Thin.ttf # 符号字体
  latin_font: MapleMono-NF-CN-Thin.ttf # 西文本体
  popup_font: MapleMono-NF-CN-Thin.ttf # 按键提示字体
  hanb_font: MapleMono-NF-CN-Thin.ttf # 扩充字体
  keyboard_height: 235 # 锁定竖屏键盘高度，避免切换时键盘高度变化而造成闪烁
  keyboard_height_land: 160 # 锁定横屏下键盘高度，避免切换时键盘高度变化而造成闪烁
  candidate_padding: 15 # 候选项内边距
  candidate_spacing: 5 # 候选间距
  candidate_text_size: 20 # 候选字号
  candidate_view_height: 28 # 候选区高度
  comment_height: 14 # 编码提示区高度
  comment_on_top: true # 编码提示在上方
  comment_text_size: 12 # 编码提示字号
  vertical_gap: 4 # 键盘行距
  horizontal_gap: 4 # 键水平间距
  key_height: 52 # 键高
  key_width: 10 # 键宽，占屏幕宽的百分比
  round_corner: 8 # 按键圆角半径
  key_text_size: 22 # 键字号
  key_border: 1 # 按键边框粗细
  key_long_text_size: 16 # 长标签字号
  symbol_text_size: 10 # 符号字号
  popup_width: 45 # 按键提示宽度
  popup_height: 50 # 按键提示高度
  popup_bottom_margin: 68 # 按键提示底边距
  popup_key_height: 48 # 按键提示内键高度
  popup_text_size: 23 # 按键提示字号
  keyboard_padding_bottom: 12 # 键盘底部内边距
  shadow_radius: 0 # 按键阴影半径
  enter_label_mode: 2 # 是否使用App提供的ActionLabel内容作为Enter键的文本：0不使用，1只使用actionlabel，2优先使用，3当其他方式没有获得label时才读取actionlabel
  enter_labels:  # 定义Enter键的文本
    go: ➢
    done: ✓
    next: →
    pre:  ←
    search: 🔍
    send: ➢
    default: ➢   # 定义默认Enter键的文本

preedit:                  # 预编辑文本视图参数
  horizontal_padding: 8     # 横向内边距（整数）
  alpha: 1                 # 透明度（0-1，浮点）
  top_end_radius: 4         # 末上端圆角（浮点）
  foreground:               # 前景样式
    font_size: 16             # 预编辑字体大小（浮点）

window:               # 候选窗口（悬浮窗）参数
  insets:               # 窗口内边距
    vertical: 4           # 纵向内边距（整数）
    horizontal: 4         # 横向内边距（整数）
  item_padding:         # 候选项内边距
    vertical: 2           # 纵向内边距（整数）
    horizontal: 4         # 横向内边距（整数）
  min_width: 0          # 最小宽度（整数）
  corner_radius: 8      # 圆角半径（浮点）
  alpha: 1              # 透明度（0-1，浮点）
  foreground:           # 前景样式
    text_font_size: 20    # 文字字体大小（浮点）
    label_font_size: 16   # 序号字体大小（浮点）
    comment_font_size: 14  # 注释字体大小（浮点）

#颜色定义 (ARGB格式，16进制，前两位为Alpha透明度，后六位为RGB颜色)
colors:
  color1: &color_transparent 0x00000000
  color2: &color_white 0xFFFFFFFF
  color3: &color_black 0xFF000000
  color4: &color_gray 0xFFE4E4E4
  color5: &color_ice 0xFF69F5FF
  color6: &color_ice1 0xFF6FFFFD
  color7: &color_ice2 0xFF75FFF2
  color8: &color_ice3 0xFF7BFFE7
  color9: &color_ice4 0xFF81FFDE
  color10: &color_mint 0xFF7DFFD3
  color11: &color_mint1 0xFF6EFEC5
  color12: &color_mint2 0xFF60FDB4
  color13: &color_mint3 0xFF52FCA2
  color14: &color_mint4 0xFF44FB8E
  color15: &color_tiny_black 0xFF202020
  color16: &color_tiny_white 0xD0FFFFFF
  color17: &color_tiny_gray 0xD0202020
  color18: &color_tiny_black2 0xFF2D2D2D
  color19: &color_black_ice 0xFF0E377E
  color20: &color_black_blue 0xFF007D7D
  

# 配色方案
preset_color_schemes:
  default:
    name: 冰薄荷·浅昼
    dark_scheme: Darkmode      # 关联的深色方案
    key_text_color: *color_black         # 按键文本颜色（黑）
    back_color: *color_white             # 候选区背景（白）
    text_color: *color_black             # 编码颜色（薄荷绿）
    comment_text_color: *color_black     # 注释文本颜色（黑）
    hilited_text_color: *color_black     # 高亮编码文字（黑，浅底显眼）
    hilited_back_color: *color_transparent     # 高亮编码背景（透明）
    hilited_shadow_color: *color_transparent   # 高亮阴影（透明）
    candidate_text_color: *color_black   # 候选文本颜色（黑）
    hilited_candidate_text_color: *color_black # 高亮候选文字（白）
    hilited_candidate_back_color: *color_mint # 高亮候选背景（薄荷绿）
    hilited_comment_text_color: *color_black   # 高亮注释文字（黑）
    keyboard_back_color: 0xFFE9F1F0    # 键盘背景（冷浅灰绿）
    key_back_color: 0xFFFFFFFF         # 按键背景（白）
    hilited_key_text_color: *color_white # 高亮按键文字（白）
    text_back_color: 0xFFE9F1F0        # 编码区背景（冷浅灰绿）
    hilited_key_back_color: 0xFF58DEC6 # 高亮按键背景（中薄荷绿）
    key_border_color: 0xFFBFD9D5      # 按键边框（浅灰绿）
    shadow_color: *color_black           # 阴影颜色（黑，半透明可自行定义）
    candidate_separator_color: *color_transparent # 候选分隔线（透明）
    # 各行按键背景/文本（浅色分层，数字键盘不再单调）
    bh1: 0xFFFFFFFF
    th1: 0xFF1A2A28
    bh2: 0xFFF4FCFA
    th2: 0xFF17312E
    bh3: 0xFFEAF9F6
    th3: 0xFF15403A
    bh4: 0xFFD9F6EF
    th4: 0xFF0F4A43
    bbs: 0xFFC4F1E6                     # 退格键背景
    tbs: 0xFF0F4A43                     # 退格键文本
    bkg: 0xFFD0F5EC                     # 空格键背景
    tkg: 0xFF0F4A43                     # 空格键文本
    benter: 0xFF86EBD8                  # 回车键背景
    tenter: 0xFF0C3A35                  # 回车键文本
    bnk: 0xFFEAF9F6                     # 数字键背景
    tnk: 0xFF15403A                     # 数字键文本
    highlited_key_back_color: 0xFF52DCC2 # 数字键盘返回键背景
    bck: *color_ice                     # 符号键背景（冰薄荷绿）
  Darkmode:
    name: 冰薄荷·深宵 # 深色主题名称
    light_scheme: default
    key_text_color: *color_white          # 按键文本颜色（白）
    back_color: 0xFF151C20              # 候选区背景（深灰蓝）
    text_color: *color_ice              # 编码颜色（薄荷绿）
    comment_text_color: *color_white      # 注释文本颜色（白）
    hilited_text_color: *color_white      # 高亮编码文字（白）
    hilited_back_color: *color_transparent      # 高亮编码背景（透明）
    hilited_shadow_color: *color_transparent    # 高亮阴影（透明）
    candidate_text_color: *color_white    # 候选文本颜色（白）
    hilited_candidate_text_color: *color_tiny_white # 高亮候选文字（黑）
    hilited_candidate_back_color: *color_black_ice # 高亮候选背景（薄荷绿）
    hilited_comment_text_color: *color_white   # 高亮注释文字（白）
    keyboard_back_color: 0xFF151C20     # 键盘背景（深灰蓝）
    key_back_color: 0xFF263137          # 按键背景（深灰蓝）
    hilited_key_text_color: *color_black  # 高亮按键文字（黑）
    text_back_color: 0xFF151C20         # 编码区背景（深灰蓝）
    hilited_key_back_color: 0xFF2AA89A  # 高亮按键背景（青绿）
    key_border_color: 0x663E5057        # 按键边框（半透明蓝灰）
    shadow_color: *color_black            # 阴影颜色（黑）
    candidate_separator_color: *color_transparent # 候选分隔线（透明）
    # 各行按键背景/文本（深色分层，数字键盘层次更明显）
    bh1: 0xFF313D44
    th1: 0xFFC9FFF7
    bh2: 0xFF2C3840
    th2: 0xFFB9F7ED
    bh3: 0xFF26333B
    th3: 0xFFA8F0E2
    bh4: 0xFF234148
    th4: 0xFF8DEBD9
    bbs: 0xFF2B3940                     # 退格键背景
    tbs: 0xFF9BEEDC                     # 退格键文本
    bkg: 0xFF274047                     # 空格键背景
    tkg: 0xFF9CF8E8                     # 空格键文本
    benter: 0xFF205A65                  # 回车键背景
    tenter: 0xFFB6FFF5                  # 回车键文本
    bnk: 0xFF2A3840                     # 数字键背景
    tnk: 0xFFBFFAF0                     # 数字键文本
    highlited_key_back_color: 0xFF1A8E8A  # 数字键盘返回键背景

  IceMint_Light:
    name: 浅昼
    dark_scheme: IceMint_Dark      # 关联的深色方案
    key_text_color: *color_black         # 按键文本颜色（黑）
    back_color: *color_white             # 候选区背景（白）
    text_color: *color_ice             # 编码颜色（薄荷绿）
    comment_text_color: *color_black     # 注释文本颜色（黑）
    hilited_text_color: *color_black     # 高亮编码文字（黑，浅底显眼）
    hilited_back_color: *color_transparent     # 高亮编码背景（透明）
    hilited_shadow_color: *color_transparent   # 高亮阴影（透明）
    candidate_text_color: *color_black   # 候选文本颜色（黑）
    hilited_candidate_text_color: *color_black # 高亮候选文字（白）
    hilited_candidate_back_color: *color_mint # 高亮候选背景（薄荷绿）
    hilited_comment_text_color: *color_black   # 高亮注释文字（黑）
    keyboard_back_color: *color_gray    # 键盘背景（浅灰）
    key_back_color: *color_white         # 按键背景（白）
    hilited_key_text_color: *color_white # 高亮按键文字（白）
    text_back_color: *color_gray        # 编码区背景（浅灰）
    hilited_key_back_color: *color_ice # 高亮按键背景（薄荷绿）
    key_border_color: *color_tiny_black      # 按键边框（浅绿，弱化）
    shadow_color: *color_black           # 阴影颜色（黑，半透明可自行定义）
    candidate_separator_color: *color_transparent # 候选分隔线（透明）
    # 各行按键背景/文本（统一使用白色按键、黑色文字）
    bh1: *color_white
    th1: *color_black
    bh2: *color_white
    th2: *color_black
    bh3: *color_white
    th3: *color_black
    bh4: *color_ice2
    th4: *color_black
    bbs: *color_mint4                     # 退格键背景（白）
    tbs: *color_black                     # 退格键文本（黑）
    bkg: *color_ice3                     # 空格键背景（白）
    tkg: *color_black                     # 空格键文本（薄荷绿）
    benter: *color_ice4                  # 回车键背景（薄荷绿）
    tenter: *color_black                  # 回车键文本（白）
    bnk: *color_white                     # 数字键背景（白）
    tnk: *color_black                     # 数字键文本（黑）
    bck: *color_ice                     # 符号键背景（冰薄荷绿）

  # 冰薄荷·深色
  IceMint_Dark:
    name: 深宵
    light_scheme: IceMint_Light     # 关联的浅色方案
    key_text_color: *color_white          # 按键文本颜色（白）
    back_color: *color_tiny_black              # 候选区背景（深灰黑）
    text_color: *color_ice              # 编码颜色（薄荷绿）
    comment_text_color: *color_white      # 注释文本颜色（白）
    hilited_text_color: *color_white      # 高亮编码文字（白）
    hilited_back_color: *color_transparent      # 高亮编码背景（透明）
    hilited_shadow_color: *color_transparent    # 高亮阴影（透明）
    candidate_text_color: *color_white    # 候选文本颜色（白）
    hilited_candidate_text_color: *color_tiny_white # 高亮候选文字（黑）
    hilited_candidate_back_color: *color_black_ice # 高亮候选背景（薄荷绿）
    hilited_comment_text_color: *color_white   # 高亮注释文字（白）
    keyboard_back_color: *color_tiny_black     # 键盘背景（深灰黑）
    key_back_color: *color_gray          # 按键背景（半透明灰）
    hilited_key_text_color: *color_black  # 高亮按键文字（黑）
    text_back_color: *color_tiny_black         # 编码区背景（半透明灰）
    hilited_key_back_color: *color_ice  # 高亮按键背景（薄荷绿）
    key_border_color: *color_tiny_gray        # 按键边框（深灰黑，隐入背景）
    shadow_color: *color_black            # 阴影颜色（黑）
    candidate_separator_color: *color_transparent # 候选分隔线（透明）
    # 各行按键背景/文本（半透明灰底、白字）
    bh1: *color_tiny_black2
    th1: *color_ice
    bh2: *color_tiny_black2
    th2: *color_ice3
    bh3: *color_tiny_black2
    th3: *color_mint1
    bh4: *color_tiny_black2
    th4: *color_mint1
    bbs: *color_tiny_black2                     # 退格键背景（半透明灰）
    tbs: *color_mint1                     # 退格键文本（白）
    bkg: *color_tiny_black2                     # 空格键背景（半透明灰）
    tkg: *color_ice                     # 空格键文本（薄荷绿）
    benter: *color_black_ice                  # 回车键背景（薄荷绿）
    tenter: *color_ice1                  # 回车键文本（黑）
    bnk: *color_tiny_gray                     # 数字键背景（半透明灰）
    tnk: *color_white                     # 数字键文本（白）

preset_keys:
  Shift_L: { label: "⇧", preview: "⇪", functional: false, send: "Shift_L" }
  Shift_L2: { label: "选择", preview: "⇪", functional: false, send: "Shift_L" }
  Shift_L3: { label: "Shift", preview: "⇪", functional: false, send: "Shift_L", shift_lock: "click" }
  Return: { label: "enter_labels", preview: "↩", functional: false, send: "Return" }
  Return1: { label: "enter", preview: "↩", functional: false, send: "Return" }
  Return2: { label: " ↩ ", send: "Return" }
  Hide: { label: "隐藏", send: "BACK" }
  BackSpace: { label: "⌫", preview: "⇦", repeatable: true, functional: false, send: "BackSpace" }
  BackSpace3: { label: " ⌫ ", preview: "⇦", repeatable: true, functional: false, send: "BackSpace" }
  BackSpace2: { label: "⌫", preview: "⇦", repeatable: true, functional: false, slide_delete: true, send: "BackSpace" }
  space: { repeatable: false, preview: " ", functional: false, slide_cursor: true, label: "——", send: "space" }
  space1: { repeatable: false, label: " ␣ ", functional: false, send: "space" }
  Clear: { label: "全清", send: "Clear" }
  Escape: { label: "取消", functional: false, send: "Escape" }
  Home: { label: "行首", send: "Home", functional: false }
  Insert: { label: "插入", send: "Insert" }
  Delete: { label: "删除", send: "Delete", functional: false }
  End: { label: "行尾", send: "End", functional: false }
  Page_Up: { label: "上页", send: "Page_Up", functional: false }
  Page_Down: { label: "下页", send: "Page_Down", functional: false }
  Left: { label: "←", send: "Left", repeatable: true, functional: false }
  Down: { label: "↓", send: "Down", functional: false }
  Up: { label: "↑", send: "Up", functional: false }
  Right: { label: "→", send: "Right", repeatable: true, functional: false }
  select_all: { label: "全选", functional: false, send: "Control+a" }
  cut: { label: "剪切", functional: false, send: "Control+x" }
  copy: { label: "复制", functional: false, send: "Control+c" }
  paste: { label: "粘贴", functional: false, send: "Control+v" }
  paste_clip: { label: "粘贴", send: "function", command: "clipboard" }
  paste_text: { label: "貼上文本", send: "Control+Shift+Alt+v" }
  share_text: { label: "分享文本", send: "Control+Alt+s" }
  redo: { label: "重做", functional: false, send: "Control+Shift+z" }
  undo: { label: "撤销", functional: false, send: "Control+z" }
  delimiter: { label: "分词", text: "'" }
  F4: { label: "方案菜单", send: "F4" }
  BackToPreviousSyllable: { label: "删音节", send: "Control+BackSpace" }
  CommitRawInput: { label: "编码", send: "Control+Return" }
  CommitScriptText: { label: "编码", send: "Shift+Return" }
  CommitComment: { label: "编码", send: "Control+Shift+Return" }
  DeleteCandidate: { label: "删词", send: "Control+Delete", functional: false }
  Keyboard_letter: { label: "字母", functional: true, send: "Eisu_toggle", select: "default" }
  Keyboard_default: { label: "↩", functional: false, send: "Eisu_toggle", select: ".default" }
  Keyboard_switch: { label: "键盘", functional: true, send: "Eisu_toggle", select: ".next" }
  Keyboard_number: { label: "123", functional: false, send: "Eisu_toggle", select: "number" }
  Keyboard_editor: { label: "编辑", functional: false, send: "Eisu_toggle", select: "editor" }
  Keyboard_symbols: { label: "更多", functional: false, send: "Eisu_toggle", select: "symbols" }
  Keyboard_move: { label: "❖", functional: true, send: "Eisu_toggle", select: "move" }
  Keyboard_next: { label: "后退", functional: false, send: "Eisu_toggle", select: ".next" }
  Keyboard_last: { label: "后退", functional: false, send: "Eisu_toggle", select: ".last" }
  Keyboard_last_lock: { label: "返回", send: "Eisu_toggle", select: ".last_lock" }
  liquid_keyboard_exit: { label: " ◈ ", send: "function", command: "liquid_keyboard", option: "-1" }
  liquid_keyboard_switch: { label: "更多", send: "function", command: "liquid_keyboard", option: "特殊" }
  liquid_keyboard_tabs: { label: "更多", send: "function", command: "liquid_keyboard", option: "更多" }
  liquid_keyboard_emoji: { label: "🙂", send: "function", command: "liquid_keyboard", option: "emoji" }
  liquid_keyboard_ascii: { label: "符", send: "function", command: "liquid_keyboard", option: "英符" }
  menu_keyboard: { label: "菜单", send: "function", command: "menu_keyboard" }
  clipboard_window: { label: "剪贴", send: "function", command: "clipboard_window" }
  Mode_switch: { toggle: "ascii_mode", functional: false, send: "Mode_switch", states: [ "cn", "en" ] }
  Zenkaku_Hankaku: { toggle: "full_shape", send: "Mode_switch", states: [ "半角", "全角" ] }
  Henkan: { toggle: "simplification", send: "Mode_switch", states: [ "漢字", "汉字" ] }
  Charset_switch: { toggle: "extended_charset", send: "Mode_switch", states: [ "常用", "增广" ] }
  Punct_switch: { toggle: "ascii_punct", send: "Mode_switch", states: [ "。，", "．，" ] }
  IME_switch: { label: "🌐", send: "LANGUAGE_SWITCH" }
  Schema_switch: { label: "下一方案", functional: false, send: "Control+Shift+1" }
  Schema_Eng: { label: "En", functional: true, send: "Control+Shift+0" }
  Theme_settings: { label: "⌘", send: "SETTINGS", option: "theme" }
  Color_switch: { label: "✦", functional: false, send: "PROG_RED" }
  Menu: { label: "❖", functional: false, send: "Menu" }
  Settings: { label: "⚙️", functional: false, send: "SETTINGS" }
  Date: { label: "日期", send: "function", command: "date", option: "yyyy-MM-dd" }
